<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengkel Kita Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="navbar shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-4 py-4">
            <h1 class="font-bold text-2xl flex items-center gap-2 text-white">
                <i data-lucide="wrench"></i> Bengkel Kita
            </h1>
            <div class="flex items-center gap-2 bg-white/20 px-4 py-1.5 rounded-full border border-white/20">
                <span class="status-dot"></span>
                <span class="text-xs font-bold uppercase text-white">Sistem Aktif</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8 space-y-8">
        
        <section class="form-container bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-blue-700">
                <i data-lucide="plus-circle"></i> Catat Servis Baru
            </h2>
            <form id="service-form" class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div class="input-group">
                    <label>Nama Pelanggan</label>
                    <input type="text" id="nama" placeholder="Contoh: Budi Santoso" required>
                </div>
                <div class="input-group md:col-span-2">
                    <label>Jenis Motor</label>
                    <input type="text" id="motor" placeholder="Contoh: Honda Vario 150" required>
                </div>
                <div class="input-group md:col-span-2">
                    <label>Keluhan</label>
                    <input type="text" id="keluhan" placeholder="Apa keluhannya?" required>
                </div>
                <div class="input-group">
                    <label>Total Biaya (Rp)</label>
                    <input type="number" id="biaya" placeholder="0" required>
                </div>
                <div class="input-group md:col-span-2">
                    <label>Tindakan</label>
                    <input type="text" id="tindakan" placeholder="Apa yang dikerjakan?" required>
                </div>
                <div class="flex items-end">
                    <button type="submit" id="btn-simpan" class="btn-submit">
                        <i data-lucide="save"></i> Simpan Data
                    </button>
                </div>
            </form>
        </section>

        <section>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800">Riwayat Servis</h2>
                <button onclick="loadData()" class="p-2 rounded-full hover:bg-slate-200 text-slate-500 transition">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>

            <div id="loader" class="flex flex-col items-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
            </div>

            <div id="app-container" class="grid gap-6 grid-cols-1 md:grid-cols-2 lg:grid-cols-2">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
